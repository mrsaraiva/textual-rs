name: release

on:
  push:
    tags:
      - "v*"

# NOTE: textual depends on the in-repo `textual-macros` crate. The publish job below
# publishes `textual-macros` first (idempotently, skipping versions already on crates.io)
# and waits for the index to propagate before publishing `textual`, so a tag push that
# bumps both crates releases them in the correct order with no manual step.

jobs:
  test:
    runs-on: ubuntu-latest
    # Many runtime tests initialize a real terminal driver and need a TTY (they hit
    # WouldBlock on headless CI). Non-blocking until the runtime tests are headless-safe;
    # `package` is the real publishability gate. (textual is 1.0.0-dev / WIP.)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Tests
        env:
          CARGO_INCREMENTAL: "0"
        run: script -qefc 'cargo test --lib -- --test-threads=1' /dev/null

  # Real-PTY parity harness — BLOCKING release gate. Runs example binaries in a
  # genuine pseudo-terminal against Python-generated goldens; headless-safe
  # because the harness allocates its own PTY (unlike the unit suite above).
  pty-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-parity-${{ hashFiles('**/Cargo.lock') }}
      - name: Build examples
        env:
          CARGO_INCREMENTAL: "0"
        run: cargo build --examples
      - name: PTY parity tests (blocking)
        env:
          CARGO_INCREMENTAL: "0"
        run: cargo test --test pty_parity -- --nocapture

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Package (dry run)
        env:
          CARGO_INCREMENTAL: "0"
        run: cargo package -p textual

  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    needs: [package, pty-parity]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Read crate versions
        id: versions
        run: |
          set -euo pipefail
          meta=$(cargo metadata --no-deps --format-version 1)
          tv=$(echo "$meta" | python3 -c "import json,sys; pkgs=json.load(sys.stdin)['packages']; print(next(p['version'] for p in pkgs if p['name']=='textual'))")
          mv=$(echo "$meta" | python3 -c "import json,sys; pkgs=json.load(sys.stdin)['packages']; print(next(p['version'] for p in pkgs if p['name']=='textual-macros'))")
          echo "textual=$tv" >> "$GITHUB_OUTPUT"
          echo "macros=$mv" >> "$GITHUB_OUTPUT"
      - name: Authenticate with crates.io
        id: auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish textual-macros (if new)
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          v="${{ steps.versions.outputs.macros }}"
          if curl -sfL -A "release-workflow (https://github.com/mrsaraiva)" "https://crates.io/api/v1/crates/textual-macros/${v}" >/dev/null; then
            echo "textual-macros ${v} already published; skipping"
          else
            cargo publish -p textual-macros --locked
            # Wait for the sparse index to propagate so the textual publish resolves it.
            for i in $(seq 1 30); do
              if curl -sfL "https://index.crates.io/te/xt/textual-macros" | grep -q "\"vers\":\"${v}\""; then
                echo "index has textual-macros ${v}"; break
              fi
              echo "waiting for textual-macros ${v} on the index..."; sleep 10
            done
          fi
      - name: Publish textual (if new)
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail
          v="${{ steps.versions.outputs.textual }}"
          if curl -sfL -A "release-workflow (https://github.com/mrsaraiva)" "https://crates.io/api/v1/crates/textual/${v}" >/dev/null; then
            echo "textual ${v} already published; skipping"
          else
            cargo publish -p textual --locked
          fi

  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [package, publish]
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
